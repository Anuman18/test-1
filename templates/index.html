<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSME Photo Booth 2026</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <div class="page-wrapper">

    <div class="left-side">
      <div class="booth-card" id="boothCard">

        <div class="screen screen--camera" id="screenCamera">
          <div class="layout-panel layout-panel--top">
            <img src="/static/layouts/layout_top.png" alt="Event Header" class="layout-img" draggable="false" />
          </div>

          <div class="camera-area" id="cameraArea">
            <video id="videoFeed" autoplay playsinline muted></video>
            <canvas id="captureCanvas" style="display:none;"></canvas>

            <div class="countdown-overlay" id="countdownOverlay" aria-live="polite">
              <span class="countdown-number" id="countdownNumber"></span>
            </div>

            <div class="flash-overlay" id="flashOverlay"></div>

            <div class="camera-status" id="cameraStatus">
              <div class="status-spinner"></div>
              <p>Starting camera...</p>
            </div>
          </div>

          <div class="layout-panel layout-panel--bottom">
            <img src="/static/layouts/layout_bottom.png" alt="Event Footer" class="layout-img" draggable="false" />
          </div>
        </div>

        <div class="screen screen--result" id="screenResult" aria-hidden="true">
          <div class="result-photo-wrap">
            <img id="resultPhoto" src="" alt="Your photo" class="result-photo" />
          </div>

          <div class="result-qr-panel">
            <div class="qr-box">
              <img id="qrCode" src="" alt="QR Code" />
            </div>
            <div class="qr-text">
              <p class="qr-label">Scan to download</p>
              <p class="qr-sub">your photo</p>
            </div>
          </div>

          <div class="result-actions">
            <button id="retakeBtn" class="btn btn--retake">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>
              Retake
            </button>
            <button id="nextGuestBtn" class="btn btn--next">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
              Next Guest
            </button>
          </div>
        </div>

      </div>

      <div class="capture-wrap" id="captureWrap">
        <button class="capture-btn" id="captureBtn" aria-label="Capture photo">
          <svg class="capture-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <span>CAPTURE</span>
        </button>
        <p class="capture-hint" id="captureHint">Look at the camera and smile</p>
      </div>
    </div>

    <div class="right-side">
        <h2 class="gallery-title">Event Gallery</h2>
        <div class="gallery-grid" id="galleryGrid">
            </div>
    </div>

    <div class="processing-overlay" id="processingOverlay" aria-hidden="true">
      <div class="processing-card">
        <div class="processing-spinner"></div>
        <p>Creating your photo...</p>
      </div>
    </div>

    <div class="toast toast--error" id="errorToast" role="alert" aria-live="assertive"></div>

  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
